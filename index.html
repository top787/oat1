<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Conversor</title>
</head>
<body>

<h2>Conversor de Real para Dólar</h2>

<input type="number" id="valorReal" placeholder="Ex: 100">
<button onclick="converter()">Converter</button>

<h3 id="resultado"></h3>

<script>
function converter() {
    let real = parseFloat(document.getElementById("valorReal").value);
    let dolar = real / 5.30;

    document.getElementById("resultado").innerText =
        "US$ " + dolar.toFixed(2);
}
</script>

</body>
</html>
